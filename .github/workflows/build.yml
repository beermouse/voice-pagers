name: Build Mod

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Pre-installed Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.1.1

    - name: Generate Missing Wrapper Jar
      run: gradle wrapper --gradle-version 8.1.1

    - name: Fix Line Endings for Linux
      run: |
        sed -i 's/\r$//' gradlew
        chmod +x gradlew

    - name: Build Mod with Forge
      run: ./gradlew build
